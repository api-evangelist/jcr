aid: jcr
name: JCR
description: >-
  JCR (Java Content Repository) is a Java specification (JSR-283, "Content
  Repository for Java Technology API 2.0") that provides a vendor-neutral,
  implementation-independent way to access content bi-directionally on a
  granular level within a content repository. It defines features for
  hierarchical content modeling, versioning, access control, search, locking,
  and observation, with the javax.jcr package as its core. The reference
  implementation is provided by the Apache Jackrabbit project.
